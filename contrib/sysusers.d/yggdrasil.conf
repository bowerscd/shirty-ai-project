# Dedicated system user/group for the yggdrasil daemon.
#
# Created by `systemd-sysusers` on package install. The daemon has no
# package-managed home/state directory; gateways and mid-chain relays hold
# only identity.key plus config.toml on disk.
#
# Format: type name id gecos home shell
u yggdrasil - "yggdrasil daemon" - /usr/sbin/nologin
