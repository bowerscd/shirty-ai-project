# Dedicated system user/group for the yggdrasil daemon.
#
# Created by `systemd-sysusers` on package install. The home directory
# matches StateDirectory= in yggdrasil.service so the daemon's working
# directory aligns with where it writes per-host state (TOFU candidates,
# runtime markers).
#
# Format: type name id gecos home shell
u yggdrasil - "yggdrasil daemon" /var/lib/yggdrasil /usr/sbin/nologin
