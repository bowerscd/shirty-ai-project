# Persistent directory layout for the yggdrasil daemon.
#
# Created by `systemd-tmpfiles --create` on package install. The
# RuntimeDirectory=yggdrasil directive in yggdrasil.service handles
# /run/yggdrasil per-start, so it isn't listed here. Likewise
# StateDirectory=yggdrasil creates /var/lib/yggdrasil on first start
# with the right ownership; the entry below is kept so operators who
# run `yggdrasilctl identity rotate` before first start (the recommended
# flow) find the directory already in place.
#
# Format: type path mode user group age argument
d /etc/yggdrasil         0755 root      root      - -
d /etc/yggdrasil/conf.d  0755 root      root      - -
d /etc/yggdrasil/certs   0755 root      root      - -
d /var/lib/yggdrasil     0750 yggdrasil yggdrasil - -
