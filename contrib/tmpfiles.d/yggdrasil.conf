# Persistent configuration directory layout for the yggdrasil daemon.
#
# Created by `systemd-tmpfiles --create` on package install. The
# RuntimeDirectory=yggdrasil directive in yggdrasil.service handles
# /run/yggdrasil per-start, so it isn't listed here. There is no
# package-managed /var/lib/yggdrasil state directory; terminals that use
# ACME may create their own storage there and grant the service write
# access with a systemd drop-in.
#
# Format: type path mode user group age argument
d /etc/yggdrasil         0755 root root - -
d /etc/yggdrasil/conf.d  0755 root root - -
d /etc/yggdrasil/certs   0755 root root - -
