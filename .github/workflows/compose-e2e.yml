name: e2e

# End-to-end test: brings up the full network stack via podman-compose,
# drives real TCP/UDP/HTTPS traffic through yggdrasil, verifies chain
# introspection, SNI dispatch, cert hot-reload, and network isolation.
# Runs against a clean repo checkout — no host state.
#
# Decoupled from the unit/integration test workflow because the container
# build is comparatively slow (cold ~3 min on GitHub-hosted runners,
# warm ~1 min with cargo cache). Runs on PRs that touch the workspace
# crates or the compose definitions, plus nightly for drift detection.

on:
  # Reusable: the Release workflow calls this as the master/tag gate
  # (workflow_call ignores the paths filters below, so a release always
  # runs the full e2e regardless of what changed). Master pushes go
  # through release.yml, so there is no standalone push trigger here —
  # that would double every master run.
  workflow_call:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "docker/**"
      - "tests/e2e/**"
      - ".github/workflows/compose-e2e.yml"
  schedule:
    # 04:17 UTC daily — off-peak, doesn't collide with the bench workflow.
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Include the workflow name so a release-driven call (github.workflow =
  # "Release") does not share a group with the standalone scheduled /
  # dispatch runs (github.workflow = "e2e") on the same ref — otherwise the
  # 04:17 UTC schedule could cancel an in-flight release gate.
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-quickstart:
    name: podman-compose 2-node quickstart
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install podman + podman-compose
        # ubuntu-latest ships podman in apt; podman-compose comes from PyPI
        # (the apt package lags upstream by several releases). Pinned for
        # reproducibility.
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends podman python3-pip
          sudo pip3 install --break-system-packages 'podman-compose==1.5.0'
          podman --version
          podman-compose --version

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-e2e-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-cargo-

      - name: Run quickstart end-to-end tests
        # `run-quickstart.sh` handles its own build + bootstrap + teardown,
        # and dumps every service's logs on failure before tearing the
        # stack down (see its teardown trap), so no separate log-dump step
        # is needed here.
        run: bash tests/e2e/run-quickstart.sh

      - name: Upload packet captures on failure
        # The run script collects per-node udp/51820 pcaps into
        # tests/e2e/artifacts/ on a failing run (before teardown).
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-quickstart-pcaps-${{ github.sha }}
          path: tests/e2e/artifacts/quickstart/*.pcap
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: |
          podman-compose -f docker/compose.e2e.quickstart.yml -p yggdrasil-e2e-quickstart \
            down --remove-orphans || true

  e2e-chain:
    name: podman-compose 3-node chain
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install podman + podman-compose
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends podman python3-pip
          sudo pip3 install --break-system-packages 'podman-compose==1.5.0'
          podman --version
          podman-compose --version

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-e2e-chain-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-chain-cargo-
            ${{ runner.os }}-e2e-cargo-

      - name: Run chain end-to-end tests
        # `run-chain.sh` dumps every service's logs on failure before
        # tearing the stack down (see its teardown trap), so no separate
        # log-dump step is needed here.
        run: bash tests/e2e/run-chain.sh

      - name: Upload packet captures on failure
        # The run script collects per-node udp/51820 pcaps into
        # tests/e2e/artifacts/ on a failing run (before teardown).
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-chain-pcaps-${{ github.sha }}
          path: tests/e2e/artifacts/chain/*.pcap
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: |
          podman-compose -f docker/compose.e2e.chain.yml -p yggdrasil-e2e-chain \
            down --remove-orphans || true
