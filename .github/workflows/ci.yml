name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel an in-flight CI run when a new push lands on the same ref.
# Saves runner minutes during rebase/fixup churn; the user only cares
# about the latest commit's CI outcome anyway.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --benches -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  docs-cli-drift:
    # The bin crates' build.rs scripts regenerate
    # `docs/cli-reference/{yggdrasil,yggdrasilctl}.md` from the clap-derive
    # definitions in `cli-defs`. This job confirms the committed files
    # match what the build would emit, catching contributors who change
    # the CLI but forget to commit the regenerated docs.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --locked
      - name: assert no drift in docs/cli-reference/
        run: git diff --exit-code -- docs/cli-reference/

  docs-rust:
    # Verify rustdoc builds cleanly across the workspace. Catches
    # doc-comment syntax errors and rustdoc crashes.
    #
    # Tightening to `-D warnings` is deferred: the codebase has ~50
    # pre-existing intra-doc-link warnings from earlier refactors
    # (private items linked from public docs, removed-symbol
    # references). Each is a one-line fix but auditing the full set
    # is its own work item; until that lands, the job verifies the
    # docs *build* without gating on warning count.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  shellcheck:
    # Static analysis on the bench harness + e2e scripts. Several
    # hundred lines of bash with non-trivial control flow; shellcheck
    # routinely catches quoting bugs and unset-variable surprises that
    # would otherwise fire mid-run on the bench / e2e runners.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends shellcheck
      - name: shellcheck bench + e2e
        # warning-level: skip info-only style notes (SC1091 sourced-file
        # tracking, SC2034 unused-vars in compose-pass-through cases).
        # Error + warning findings are CI-blocking.
        run: shellcheck -S warning tests/e2e/*.sh bench/*.sh bench/lib/*.sh

  supply-chain:
    # `cargo deny check` runs all four sub-checks at once: license
    # allow-list, RustSec advisory DB (CVEs + unmaintained), version-
    # conflict bans, source registry allow-list. Config lives at
    # `deny.toml`; advisory ignores there carry sunset notes.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-deny
        run: cargo install --locked cargo-deny --version 0.18.6
      - name: cargo deny check
        run: cargo deny check

  micro-bench:
    # Runs criterion micro-benches on every PR with --quick-mode so the gate is
    # cheap. The serious e2e numbers live in bench.yml on a self-hosted runner.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: run criterion benches (quick)
        run: |
          cargo bench --workspace --benches -- --quick --warm-up-time 1 --measurement-time 3
      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-${{ github.sha }}
          path: target/criterion/**/report/index.html
          if-no-files-found: ignore

  fuzz-smoke:
    # Runs each cargo-fuzz target for a bounded wall-clock budget on every
    # PR. Catches regressions in the wire/control-frame/predicate parsers
    # cheaply; not exhaustive coverage. Deep fuzzing happens out of band
    # (developer workstation now, OSS-Fuzz integration once the repo has a
    # remote).
    #
    # The pinned nightly date matches crates/ratatoskr/fuzz/rust-toolchain.toml.
    # Bump in lockstep when rotating; the fuzz crate's TOML is the source
    # of truth — this job mirrors it because dtolnay/rust-toolchain@master
    # cannot read the per-subdir pin.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - wire_parse
          - control_frame_decode
          - predicate_decode
          - chain_query_decode
          - enrollment_decode
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/ratatoskr/fuzz
      - name: install cargo-fuzz
        run: cargo install --locked cargo-fuzz
      - name: fuzz ${{ matrix.target }} (30s smoke)
        run: |
          cd crates/ratatoskr/fuzz
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=30 -runs=100000

