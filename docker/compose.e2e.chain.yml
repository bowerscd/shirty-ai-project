# End-to-end network-stack test for the 3-level chain control plane.
#
# Topology:
#
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ  client-chain  в”Ӯ 172.30.1.40
#   в”Ӯ   (tester)     в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#            в”Ӯ wan-chain (172.30.1.0/24)
#            в”Ӯ
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ        в–ј                                                    в”Ӯ
#   в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ    chain ctrl     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ        в”Ӯ
#   в”Ӯ  в”Ӯ   home-chain в”Ӯ в”Җв”Җв”Җв”Җheartbeatв”Җв”Җв–ә  в”Ӯ    midbox    в”Ӯ        в”Ӯ
#   в”Ӯ  в”Ӯ   172.30.1.30в”Ӯ  predicate push   в”Ӯ   172.30.1.20в”Ӯ        в”Ӯ
#   в”Ӯ  в”Ӯ   terminal   в”Ӯ                   в”Ӯ relay+forwardв”Ӯ        в”Ӯ
#   в”Ӯ  в”Ӯ  upstream=mb в”Ӯ                   в”Ӯ upstream=vps в”Ӯ        в”Ӯ
#   в”Ӯ  в”Ӯ  rules dir:  в”Ӯ                   в”Ӯ downstream=hmв”Ӯ        в”Ӯ
#   в”Ӯ  в”Ӯ  home-tcp-   в”Ӯ                   в”Ӯ  listener    в”Ӯ        в”Ӯ
#   в”Ӯ  в”Ӯ  echo :7200  в”Ӯ                   в”Ӯ  :51820      в”Ӯ        в”Ӯ
#   в”Ӯ  в”Ӯ  +loopback   в”Ӯ                   в”Ӯ              в”Ӯ        в”Ӯ
#   в”Ӯ  в”Ӯ  echo:7100   в”Ӯ                   в”Ӯ              в”Ӯ        в”Ӯ
#   в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                   в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ        в”Ӯ
#   в”Ӯ                                            в”Ӯ chain ctrl     в”Ӯ
#   в”Ӯ                                            в”Ӯ heartbeat      в”Ӯ
#   в”Ӯ                                            в”Ӯ                в”Ӯ
#   в”Ӯ                                            в”Ӯ                в”Ӯ
#   в”Ӯ                                            в–ј                в”Ӯ
#   в”Ӯ                                     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ        в”Ӯ
#   в”Ӯ                                     в”Ӯ  vps-chain   в”Ӯ        в”Ӯ
#   в”Ӯ                                     в”Ӯ  172.30.1.10 в”Ӯ        в”Ӯ
#   в”Ӯ                                     в”Ӯ  relay       в”Ӯ        в”Ӯ
#   в”Ӯ                                     в”Ӯ  downstream= в”Ӯ        в”Ӯ
#   в”Ӯ                                     в”Ӯ   midbox     в”Ӯ        в”Ӯ
#   в”Ӯ                                     в”Ӯ  listener    в”Ӯ        в”Ӯ
#   в”Ӯ                                     в”Ӯ   :51820     в”Ӯ        в”Ӯ
#   в”Ӯ                                     в”Ӯ  (residual   в”Ӯ        в”Ӯ
#   в”Ӯ                                     в”Ӯ  loopback    в”Ӯ        в”Ӯ
#   в”Ӯ                                     в”Ӯ  echo:7100)  в”Ӯ        в”Ӯ
#   в”Ӯ                                     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ        в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# What the smoke driver exercises:
#
#   * Predicate flow: home publishes the home-tcp-echo predicate over the
#     chain control plane to midbox. midbox derives a matching listener
#     on midbox:7200 that proxies to home:7200, which proxies to
#     127.0.0.1:7100 on home (the loopback echo). vps stays unaware вҖ”
#     v1 relays do not re-project predicates upward.
#
#   * `yggdrasilctl chain diff`: the smoke driver runs the diff from
#     home and asserts exit 0 (predicates published from home match what
#     midbox accepted; vps is end-of-chain and has nothing to compare).
#
# Note: the chain wire no longer carries tunnel frames, so vps-chain's
# loopback echo on :7100 is unused by the current smoke driver. It is
# kept only because vps-chain shares chain-loopback-echo-entrypoint.sh
# with home-chain, where the loopback echo is still the predicate-flow
# target.

x-yggdrasil-image: &yggdrasil-image
  build:
    context: ..
    dockerfile: docker/Dockerfile.e2e

networks:
  wan-chain:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.1.0/24

volumes:
  vps_chain_etc:
  vps_chain_run:
  vps_chain_state:
  midbox_etc:
  midbox_run:
  midbox_state:
  home_chain_etc:
  home_chain_run:
  home_chain_state:

services:
  init-chain:
    <<: *yggdrasil-image
    container_name: e2e-chain-init
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/bootstrap-chain.sh"]
    volumes:
      - vps_chain_etc:/etc/yggdrasil-vps
      - midbox_etc:/etc/yggdrasil-midbox
      - home_chain_etc:/etc/yggdrasil-home
    restart: "no"
    networks:
      - wan-chain

  vps-chain:
    <<: *yggdrasil-image
    container_name: e2e-chain-vps
    # `init-chain` must run to completion BEFORE the daemons start. We
    # rely on tests/e2e/run-chain.sh orchestrating that explicitly with
    # `run --rm init-chain` because podman-compose 1.5 doesn't honour
    # `depends_on.condition: service_completed_successfully`.
    command:
      - /usr/local/bin/chain-loopback-echo-entrypoint.sh
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
      # vps-chain runs a residual loopback echo on :7100; the chain
      # wire no longer carries tunnel frames, so it is currently unused.
      ECHO_TCP_PORT: "7100"
    volumes:
      - vps_chain_etc:/etc/yggdrasil
      - vps_chain_run:/run/yggdrasil
      - vps_chain_state:/var/lib/yggdrasil
    networks:
      wan-chain:
        ipv4_address: 172.30.1.10
    expose:
      - "51820/udp"

  midbox:
    <<: *yggdrasil-image
    container_name: e2e-chain-midbox
    depends_on:
      vps-chain:
        condition: service_started
    command:
      - yggdrasil
      - run
      - --config
      - /etc/yggdrasil/config.toml
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
    volumes:
      - midbox_etc:/etc/yggdrasil
      - midbox_run:/run/yggdrasil
      - midbox_state:/var/lib/yggdrasil
    networks:
      wan-chain:
        ipv4_address: 172.30.1.20
    expose:
      - "7200/tcp"
      - "51820/udp"

  home-chain:
    <<: *yggdrasil-image
    container_name: e2e-chain-home
    depends_on:
      midbox:
        condition: service_started
    command:
      - /usr/local/bin/chain-loopback-echo-entrypoint.sh
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
      # home's loopback echo is the local backend for the terminal-mode
      # rule (listen=:7200, target_addr=127.0.0.1:7100).
      ECHO_TCP_PORT: "7100"
    volumes:
      - home_chain_etc:/etc/yggdrasil
      - home_chain_run:/run/yggdrasil
      - home_chain_state:/var/lib/yggdrasil
    networks:
      wan-chain:
        ipv4_address: 172.30.1.30
    expose:
      - "7200/tcp"

  client-chain:
    image: python:3.12-slim
    container_name: e2e-chain-client
    depends_on:
      vps-chain:
        condition: service_started
      midbox:
        condition: service_started
      home-chain:
        condition: service_started
    working_dir: /tests
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ../tests/e2e:/tests:ro
    networks:
      wan-chain:
        ipv4_address: 172.30.1.40
