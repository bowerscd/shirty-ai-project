# End-to-end test for the 3-node chain quickstart deployment.
#
# Topology — faithful homelab segmentation with a mid-chain relay,
# four networks each limited to who should reach whom:
#
#   ┌────────┐  client_wan  ┌─────────┐  inet_link  ┌───────┐  chain_link  ┌──────────┐  home_lan  ┌─────────────────┐
#   │ client │ ────────────►│ gateway │ ◄──────────►│ relay │ ◄──────────►│ terminal │ ◄─────────►│ app servers     │
#   └────────┘              └─────────┘             └───────┘              └──────────┘            └─────────────────┘
#   172.31.10.10            172.31.10.20            172.31.11.20           172.31.12.20           172.31.13.{20-50}
#                           172.31.11.10            172.31.12.10           172.31.13.10
#
# Same scenario suite as compose.e2e.quickstart.yml; the only
# difference is the extra hop. Proves predicate forwarding, `chain
# diff`, `chain canary`, and SNI dispatch across one additional hop
# without re-testing any node-local behaviour redundantly.
#
# Address-space note: this stack uses 172.31.10.0/24 .. 172.31.13.0/24
# so it can run concurrently with compose.e2e.quickstart.yml (which
# uses 172.31.0.0/24 .. 172.31.2.0/24) on the same host during CI.

x-yggdrasil-image: &yggdrasil-image
  build:
    context: ..
    dockerfile: docker/Dockerfile.e2e

networks:
  # Public-internet stand-in: client reaches gateway, nothing else.
  client_wan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.10.0/24
  # Gateway <-> relay leg.
  inet_link:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.11.0/24
  # Relay <-> terminal leg.
  chain_link:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.12.0/24
  # Home LAN behind the terminal: gateway and relay have NO route
  # here. `internal: true` is what actually enforces that — by default
  # podman bridges different networks together via the host's
  # IP-forwarding tables, so two containers on "different" networks can
  # still reach each other unless one of the networks is explicitly
  # internal.
  home_lan:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.31.13.0/24

volumes: {}

services:
  init-chain:
    <<: *yggdrasil-image
    container_name: e2e-chain-init
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/bootstrap-chain.sh"]
    environment:
      # GATEWAY_INET_ENDPOINT and RELAY_CHAIN_ENDPOINT are hostnames so
      # both the relay -> gateway dial and the terminal -> relay dial
      # exercise the OS-resolver path. APP_TCP_IP is a literal IP so
      # the tcp-echo rule's target exercises the static-resolver code
      # path; APP_UDP_HOST is a hostname so udp-echo exercises the
      # DNS-resolver path.
      GATEWAY_INET_ENDPOINT: "gateway:51820"
      RELAY_CHAIN_ENDPOINT: "relay:51820"
      PRIMARY_SNI: "app.test.local"
      ALT_SNI: "alt.test.local"
      APP_NGINX_HOST: "app-nginx"
      APP_NGINX_ALT_HOST: "app-nginx-alt"
      APP_TCP_IP: "172.31.13.40"
      APP_UDP_HOST: "app-udp"
    volumes:
      # Bind mounts (not named volumes) so the host runtime tree is the
      # single source of truth and `tests/e2e/run-chain.sh` can
      # `rm -rf` it between runs.
      - ../tests/e2e/runtime/chain/gateway/etc:/etc/yggdrasil-gateway
      - ../tests/e2e/runtime/chain/relay/etc:/etc/yggdrasil-relay
      - ../tests/e2e/runtime/chain/terminal/etc:/etc/yggdrasil-terminal
    restart: "no"
    networks:
      - client_wan

  gateway:
    <<: *yggdrasil-image
    container_name: e2e-chain-gateway
    command:
      - yggdrasil
      - run
      - --config
      - /etc/yggdrasil/config.toml
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
    volumes:
      - ../tests/e2e/runtime/chain/gateway/etc:/etc/yggdrasil
      - ../tests/e2e/runtime/chain/gateway/run:/run/yggdrasil
      - ../tests/e2e/runtime/chain/gateway/state:/var/lib/yggdrasil
    networks:
      client_wan:
        ipv4_address: 172.31.10.20
      inet_link:
        ipv4_address: 172.31.11.10
    expose:
      - "7100/tcp"
      - "7101/udp"
      - "8443/tcp"
      - "8443/udp"
      - "51820/udp"

  relay:
    <<: *yggdrasil-image
    container_name: e2e-chain-relay
    depends_on:
      gateway:
        condition: service_started
    command:
      - yggdrasil
      - run
      - --config
      - /etc/yggdrasil/config.toml
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
    volumes:
      - ../tests/e2e/runtime/chain/relay/etc:/etc/yggdrasil
      - ../tests/e2e/runtime/chain/relay/run:/run/yggdrasil
      - ../tests/e2e/runtime/chain/relay/state:/var/lib/yggdrasil
    networks:
      inet_link:
        ipv4_address: 172.31.11.20
      chain_link:
        ipv4_address: 172.31.12.10
    expose:
      - "51820/udp"

  terminal:
    <<: *yggdrasil-image
    container_name: e2e-chain-terminal
    depends_on:
      relay:
        condition: service_started
    command:
      - yggdrasil
      - run
      - --config
      - /etc/yggdrasil/config.toml
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
    volumes:
      - ../tests/e2e/runtime/chain/terminal/etc:/etc/yggdrasil
      - ../tests/e2e/runtime/chain/terminal/run:/run/yggdrasil
      - ../tests/e2e/runtime/chain/terminal/state:/var/lib/yggdrasil
    networks:
      chain_link:
        ipv4_address: 172.31.12.20
      home_lan:
        ipv4_address: 172.31.13.10

  app-nginx:
    image: docker.io/library/nginx:alpine
    container_name: e2e-chain-app-nginx
    command:
      - sh
      - -c
      - |
        echo 'primary backend (app-nginx)' > /usr/share/nginx/html/index.html
        exec nginx -g 'daemon off;'
    networks:
      home_lan:
        ipv4_address: 172.31.13.20
    expose:
      - "80/tcp"

  app-nginx-alt:
    image: docker.io/library/nginx:alpine
    container_name: e2e-chain-app-nginx-alt
    command:
      - sh
      - -c
      - |
        echo 'alternate backend (app-nginx-alt)' > /usr/share/nginx/html/index.html
        exec nginx -g 'daemon off;'
    networks:
      home_lan:
        ipv4_address: 172.31.13.30
    expose:
      - "80/tcp"

  app-tcp:
    <<: *yggdrasil-image
    container_name: e2e-chain-app-tcp
    command:
      - python3
      - /usr/local/bin/echo-server.py
      - --mode
      - tcp
      - --tcp-port
      - "7100"
    networks:
      home_lan:
        ipv4_address: 172.31.13.40
    expose:
      - "7100/tcp"

  app-udp:
    <<: *yggdrasil-image
    container_name: e2e-chain-app-udp
    command:
      - python3
      - /usr/local/bin/echo-server.py
      - --mode
      - udp
      - --udp-port
      - "7101"
    networks:
      home_lan:
        ipv4_address: 172.31.13.50
    expose:
      - "7101/udp"

  client:
    image: docker.io/library/python:3.12-slim
    container_name: e2e-chain-client
    depends_on:
      gateway:
        condition: service_started
      relay:
        condition: service_started
      terminal:
        condition: service_started
    working_dir: /tests
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ../tests/e2e:/tests:ro
      - ../tests/e2e/runtime/chain/client-trust:/etc/ssl/yggdrasil-test:ro
    extra_hosts:
      - "app.test.local:172.31.10.20"
      - "alt.test.local:172.31.10.20"
      - "bogus.test.local:172.31.10.20"
    networks:
      client_wan:
        ipv4_address: 172.31.10.10
