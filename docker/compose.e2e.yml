# End-to-end network-stack test for the chain-control yggdrasil topology.
#
# Topology:
#
#   ┌────────────┐      wan (172.30.0.0/24)       ┌─────────────────────┐
#   │  client    │ ────────────────────────────►  │  vps (yggdrasil)    │
#   │  (tester)  │                                │   gateway-mode      │
#   └────────────┘                                │   :7000/tcp         │
#                                                 │   :7001/udp         │
#                                                 │   :51820/udp chain  │
#                                                 └──────────┬──────────┘
#                                                            │ proxied
#                                                            ▼
#                                                 ┌─────────────────────────┐
#                                                 │  home (yggdrasil        │
#                                                 │  terminal-mode +        │
#                                                 │  echo backends on       │
#                                                 │  :7100/tcp, :7101/udp;  │
#                                                 │  dns-echo rule :7200)   │
#                                                 └─────────────────────────┘
#
# Notes on the topology:
# - vps runs in gateway mode with `[accept]` pinned to home's pubkey.
#   Its rule files forward traffic from :7000/:7001 to
#   downstream_ip:7100/7101.
# - home runs in terminal mode with `[dial]` pointing at vps:51820.
#   It also runs the python echo backends in the same network
#   namespace so vps's rule-dial target lands on a real listener.
#   home additionally hosts a `dns-echo` rule on :7200 that exercises
#   the DNS resolver path (target_host="home-echo-dns:7100", with
#   home-echo-dns pinned to home's own IP via `extra_hosts`).
# - The `init` service performs one-shot key generation + offline
#   intro/invite handshake via `yggdrasilctl identity`. vps/home
#   wait for it to complete cleanly.
# - The `client` container is a vanilla python:slim that runs the test
#   harness via a bind-mounted scripts directory.

x-yggdrasil-image: &yggdrasil-image
  build:
    context: ..
    dockerfile: docker/Dockerfile.e2e

networks:
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  yggdrasil_etc:
  yggdrasil_run:
  yggdrasil_state:
  home_etc:
  home_run:
  home_state:

services:
  init:
    <<: *yggdrasil-image
    container_name: e2e-init
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/bootstrap.sh"]
    volumes:
      - yggdrasil_etc:/etc/yggdrasil
      # Mounted at distinct paths so bootstrap can write each daemon's
      # config + rules without colliding. Each daemon service mounts
      # the same volume at its canonical /etc/yggdrasil path.
      - home_etc:/etc/yggdrasil-home
    restart: "no"
    networks:
      - wan

  vps:
    <<: *yggdrasil-image
    container_name: e2e-vps
    # NOTE: the `init` service must be run to completion *before* vps/home,
    # but podman-compose 1.5 doesn't reliably honour
    # `depends_on.condition: service_completed_successfully` — it races and
    # tries to start dependents while init is mid-run. tests/e2e/run.sh
    # orchestrates init explicitly with `run --rm init` before `up -d`.
    command:
      - yggdrasil
      - run
      - --config
      - /etc/yggdrasil/config.toml
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
    volumes:
      - yggdrasil_etc:/etc/yggdrasil
      - yggdrasil_run:/run/yggdrasil
      - yggdrasil_state:/var/lib/yggdrasil
    networks:
      wan:
        ipv4_address: 172.30.0.10
    expose:
      - "7000/tcp"
      - "7001/udp"
      - "8443/tcp"
      - "51820/udp"

  home:
    <<: *yggdrasil-image
    container_name: e2e-home
    depends_on:
      vps:
        condition: service_started
    command:
      - /usr/local/bin/home-entrypoint.sh
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
      ECHO_TCP_PORT: "7100"
      ECHO_UDP_PORT: "7101"
    volumes:
      - home_etc:/etc/yggdrasil
      - home_run:/run/yggdrasil
      - home_state:/var/lib/yggdrasil
    # `home-echo-dns` resolves to home's own IP — the python TCP echo on
    # :7100 lives in the same network namespace. Used by the dns-echo
    # rule (listen=:7200, target_host=home-echo-dns:7100) to exercise
    # the OS resolver path in the proxy.
    extra_hosts:
      - "home-echo-dns:172.30.0.20"
    networks:
      wan:
        ipv4_address: 172.30.0.20
    expose:
      - "7200/tcp"

  client:
    image: python:3.12-slim
    container_name: e2e-client
    depends_on:
      vps:
        condition: service_started
      home:
        condition: service_started
    working_dir: /tests
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ../tests/e2e:/tests:ro
      - yggdrasil_run:/run/yggdrasil:ro
    networks:
      wan:
        ipv4_address: 172.30.0.30
