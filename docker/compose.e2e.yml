# End-to-end network-stack test for the chain-control yggdrasil topology.
#
# Topology:
#
#   ┌────────────┐      wan (172.30.0.0/24)       ┌─────────────────────┐
#   │  client    │ ────────────────────────────►  │  vps (yggdrasil)    │
#   │  (tester)  │                                │   relay-mode        │
#   └────────────┘                                │   :7000/tcp         │
#                                                 │   :7001/udp         │
#                                                 │   :51820/udp chain  │
#                                                 │   :9090/tcp metrics │
#                                                 └──────────┬──────────┘
#                                                            │ proxied
#                                                            ▼
#                                                 ┌─────────────────────────┐
#                                                 │  home (yggdrasil        │
#                                                 │  terminal-mode +        │
#                                                 │  echo backends on       │
#                                                 │  :7100/tcp, :7101/udp)  │
#                                                 └─────────────────────────┘
#
# Notes on the topology:
# - vps runs in relay mode with `[chain.listener]` + `[chain.downstream]`
#   pinned to home's pubkey. Its rule files forward traffic from
#   :7000/:7001 to downstream_ip:7100/7101.
# - home runs in terminal mode with `[chain.upstream]` pointing at
#   vps:51820. It also runs the python echo backends in the same network
#   namespace so vps's rule-dial target lands on a real listener.
# - The `init` service performs one-shot key generation + offline
#   intro/invite handshake via `yggdrasilctl identity`. vps/home/terminal
#   wait for it to complete cleanly.
# - The `client` container is a vanilla python:slim that runs the test
#   harness via a bind-mounted scripts directory.

x-yggdrasil-image: &yggdrasil-image
  build:
    context: ..
    dockerfile: docker/Dockerfile

networks:
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  yggdrasil_etc:
  yggdrasil_run:
  yggdrasil_state:
  home_etc:
  home_run:
  home_state:
  terminal_etc:
  terminal_run:
  terminal_state:

services:
  init:
    <<: *yggdrasil-image
    container_name: e2e-init
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/bootstrap.sh"]
    volumes:
      - yggdrasil_etc:/etc/yggdrasil
      # Mounted at distinct paths so bootstrap can write each daemon's
      # config + rules without colliding. Each daemon service mounts
      # the same volume at its canonical /etc/yggdrasil path.
      - home_etc:/etc/yggdrasil-home
      - terminal_etc:/etc/yggdrasil-terminal
    restart: "no"
    networks:
      - wan

  vps:
    <<: *yggdrasil-image
    container_name: e2e-vps
    # NOTE: the `init` service must be run to completion *before* vps/home,
    # but podman-compose 1.5 doesn't reliably honour
    # `depends_on.condition: service_completed_successfully` — it races and
    # tries to start dependents while init is mid-run. tests/e2e/run.sh
    # orchestrates init explicitly with `run --rm init` before `up -d`.
    command:
      - yggdrasil
      - run
      - --config
      - /etc/yggdrasil/config.toml
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
    volumes:
      - yggdrasil_etc:/etc/yggdrasil
      - yggdrasil_run:/run/yggdrasil
      - yggdrasil_state:/var/lib/yggdrasil
    networks:
      wan:
        ipv4_address: 172.30.0.10
    expose:
      - "7000/tcp"
      - "7001/udp"
      - "8443/tcp"
      - "51820/udp"
      - "9090/tcp"

  home:
    <<: *yggdrasil-image
    container_name: e2e-home
    depends_on:
      vps:
        condition: service_started
    command:
      - /usr/local/bin/home-entrypoint.sh
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
      ECHO_TCP_PORT: "7100"
      ECHO_UDP_PORT: "7101"
    volumes:
      - home_etc:/etc/yggdrasil
      - home_run:/run/yggdrasil
      - home_state:/var/lib/yggdrasil
    networks:
      wan:
        ipv4_address: 172.30.0.20

  # Second yggdrasil instance running in terminal mode. Exercises the
  # DNS-resolved `upstream_host` dial target by listening on :7200 and
  # forwarding to a synthetic DNS name (`home-echo-dns`) pinned to the
  # home container's IP via `extra_hosts`. Proves the resolver path runs
  # end-to-end against the system resolver inside a real container.
  terminal:
    <<: *yggdrasil-image
    container_name: e2e-terminal
    depends_on:
      home:
        condition: service_started
    command:
      - yggdrasil
      - run
      - --config
      - /etc/yggdrasil/config.toml
    environment:
      YGGDRASIL_LOG: info
      YGGDRASIL_LOG_FORMAT: pretty
    volumes:
      - terminal_etc:/etc/yggdrasil
      - terminal_run:/run/yggdrasil
      - terminal_state:/var/lib/yggdrasil
    extra_hosts:
      - "home-echo-dns:172.30.0.20"
    networks:
      wan:
        ipv4_address: 172.30.0.40
    expose:
      - "7200/tcp"

  client:
    image: python:3.12-slim
    container_name: e2e-client
    depends_on:
      vps:
        condition: service_started
      home:
        condition: service_started
      terminal:
        condition: service_started
    working_dir: /tests
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ../tests/e2e:/tests:ro
      - yggdrasil_run:/run/yggdrasil:ro
    networks:
      wan:
        ipv4_address: 172.30.0.30
